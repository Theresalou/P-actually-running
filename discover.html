<main>

            <button onclick="ouvrirPopup()">★ ORION</button>
            <!-- structure de la popup -->
            <div id="maPopup" class="popup">
                <div class="popup-contenu">

            <button onclick="ouvrirPopup()">☆ Taurus</button>

            <div id="maPopup" class="popup">

                </div>

    <script>
        function ouvrirPopup(){
            document.getElementById("maPopup").style.display = "block";
        }

        function fermerPopupp(){
            document.getElementById("maPopup").style.display = "none";
        }

        window.onclick = function(event){
            var popup = document.getElementById(maPopup);
            if (event.target == popup){
                popup.style.display = "none";
            }
        }
    </script>
