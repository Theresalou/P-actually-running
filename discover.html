<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"> 
    <link rel="stylesheet" href="./discover.css">
</head>
<body>

    <div class="classee">
        <a href="./home.html" style="font-family: fantasy; text-decoration: none; font-weight:200; font-size: 20px; border: 2px solid bisque; border-radius: 5px;">HOME</a>
        <h1 class="head">Discover🌠</h1>
    </div>
<main>
    <div class="first">
        <h2>
            🌟Cliquez sur les options suivantes
        </h2>
        <img src="./image/rosedes vents.png" alt="Rose des vents" class="compass">
    </div>

    <div class="common">    
        <div class="Elements">
            <button onclick="ouvrirPopup()">★ ORION</button>
            <!-- structure de la popup -->
            <div id="maPopup" class="popup">
                <div class="popup-contenu">
                    <span class="fermer" onclick="fermerPopup()">&times;</span>
                    <img src="./image/test12.jpeg" alt="Observe orion">
                </div>
            </div>

            <button onclick="ouvrirPopup1()">☆ Taurus</button>
            <div id="maPopup1" class="popup">
                <div class="popup-contenu">
                    <span class="fermer" onclick="fermerPopup1()">&times;</span>
                    <img src="./image/taurero.jpeg" alt="Observe Taurus">
                </div>
            </div>

            <button onclick="ouvrirPopup2()">★ Venus</button>
            <div id="maPopup2" class="popup">
                <div class="popup-contenu">
                    <span class="fermer" onclick="fermerPopup2()">&times;</span>
                    <img src="./image/Venus.jpeg" alt="Observe Venus">
                </div>
            </div>

            <button onclick="ouvrirPopup3()">☆ Gémaux</button>
            <div id="maPopup3" class="popup">
                <div class="popup-contenu">
                    <span class="fermer" onclick="fermerPopup3()">&times;</span>
                    <img src="./image/Gemaux.jpeg" alt="Observe gémaux">
                </div>
            </div>
        </div>
    </div>
    
    <script>
        function ouvrirPopup(){
            document.getElementById("maPopup").style.display = "block";
        }

        function fermerPopup(){
            document.getElementById("maPopup").style.display = "none";
        }

        window.onclick = function(event){
            var popup = document.getElementById("maPopup");
            if (event.target == popup){
                popup.style.display = "none";
            }
        }
        

        function ouvrirPopup1(){
            document.getElementById("maPopup1").style.display = "block";
        }

        function fermerPopup1(){
            document.getElementById("maPopup1").style.display = "none";
        }

        window.onclick = function(event){
            var popup = document.getElementById("maPopup1");
            if (event.target == popup){
                popup.style.display = "none";
            }
        }


        function ouvrirPopup2(){
            document.getElementById("maPopup2").style.display = "block";
        }

        function fermerPopup2(){
            document.getElementById("maPopup2").style.display = "none";
        }

        window.onclick = function(event){
            var popup = document.getElementById("maPopup2");
            if (event.target == popup){
                popup.style.display = "none";
            }
        }


        function ouvrirPopup3(){
            document.getElementById("maPopup3").style.display = "block";
        }

        function fermerPopup3(){
            document.getElementById("maPopup3").style.display = "none";
        }

        window.onclick = function(event){
            var popup = document.getElementById("maPopup3");
            if (event.target == popup){
                popup.style.display = "none";
            }
        }
    </script>
</main>
    
</body>
</html>
